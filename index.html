<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1F2A44">
<title>Scheda — Anthony</title>

<!-- iOS PWA meta tags -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scheda">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">

<!-- Apple touch icon -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

<!-- Favicon + Android icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #1F2A44;
    --navy-2: #2C3A5C;
    --orange: #E07A3C;
    --orange-dim: #F0A06C;
    --light: #F4F5F8;
    --mid: #D8DCE5;
    --gray: #6B7280;
    --text: #1F2A44;
    --success: #3B7A57;
    --danger: #B83A2A;
    --bg: #FAFBFC;
    --white: #FFFFFF;
    --shadow: 0 1px 3px rgba(31,42,68,0.08), 0 1px 2px rgba(31,42,68,0.04);
    --shadow-lg: 0 4px 16px rgba(31,42,68,0.12);
    --radius: 10px;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.4;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ HEADER ============ */
  header {
    background: var(--navy);
    color: var(--white);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    max-width: 720px;
    margin: 0 auto;
  }
  .title { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
  .session-date {
    font-size: 12px;
    color: var(--orange-dim);
    margin-top: 2px;
  }
  .session-timer {
    background: var(--orange);
    color: var(--white);
    padding: 6px 12px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    user-select: none;
  }

  /* ============ TABS ============ */
  .tabs {
    background: var(--white);
    border-bottom: 1px solid var(--mid);
    position: sticky;
    top: 52px;
    z-index: 40;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tabs-inner {
    display: flex;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 8px;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--gray);
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab .count {
    background: var(--mid);
    color: var(--gray);
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
    vertical-align: 1px;
  }
  .tab.active .count { background: var(--orange); color: var(--white); }
  .tab.completed .count { background: var(--success); color: var(--white); }

  /* ============ MAIN ============ */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 12px 120px;
  }

  .session-header {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    border-left: 4px solid var(--orange);
    box-shadow: var(--shadow);
  }
  .session-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .session-header .sub {
    font-size: 13px;
    color: var(--gray);
  }

  /* ============ EXERCISE CARD ============ */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--mid);
  }
  .card.done {
    border-color: var(--success);
    background: #F4FAF6;
  }
  .card.done .card-head {
    background: linear-gradient(to right, #E5F0E8 0%, var(--white) 100%);
  }

  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }
  .card-figure {
    width: 90px;
    height: 64px;
    background: var(--white);
    border-radius: 8px;
    flex-shrink: 0;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-figure img { width: 100%; height: 100%; object-fit: contain; }
  .card-figure svg { width: 100%; height: 100%; }
  .card-head-text { flex: 1; min-width: 0; }
  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--orange);
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
  }
  .card-summary {
    font-size: 12px;
    color: var(--gray);
    margin-top: 3px;
  }
  .card-progress {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--light);
    border-radius: 18px;
    font-weight: 700;
    font-size: 13px;
    color: var(--gray);
  }
  .card-progress.done {
    background: var(--success);
    color: var(--white);
  }
  .card-progress.partial {
    background: var(--orange);
    color: var(--white);
  }

  .card-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--mid);
  }
  .card.open .card-body { display: block; }
  .card.open .card-head { padding-bottom: 14px; }

  /* ============ EXECUTION (collapsible) ============ */
  .exec {
    background: var(--light);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .exec details summary {
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    list-style: none;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .exec details summary::-webkit-details-marker { display: none; }
  .exec details summary::after {
    content: "▾";
    font-size: 14px;
    color: var(--gray);
    transition: transform 0.15s;
  }
  .exec details[open] summary::after { transform: rotate(180deg); }
  .exec details[open] summary { margin-bottom: 8px; }
  .exec ul { padding-left: 18px; margin: 6px 0; }
  .exec ul li { margin-bottom: 4px; }
  .exec .cues-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 10px;
    margin-bottom: 4px;
  }

  /* ============ SETS TABLE ============ */
  .set-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 56px auto;
    gap: 6px;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--mid);
  }
  .set-row.done { background: #EEF7F0; }
  .set-row.last { border-bottom: none; }

  .set-num {
    font-weight: 700;
    text-align: center;
    font-size: 14px;
    color: var(--gray);
    background: var(--light);
    border-radius: 4px;
    padding: 6px 0;
  }
  .set-row.done .set-num { background: var(--success); color: var(--white); }

  .set-field {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .set-field label {
    font-size: 9px;
    color: var(--gray);
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    line-height: 1;
  }
  .set-field input {
    width: 100%;
    border: 1px solid var(--mid);
    background: var(--white);
    border-radius: 6px;
    padding: 8px 6px;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    color: var(--navy);
    font-family: inherit;
    -moz-appearance: textfield;
  }
  .set-field input:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(224,122,60,0.18);
  }
  .set-field input::-webkit-outer-spin-button,
  .set-field input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .set-field .target {
    font-size: 9px;
    color: var(--gray);
    text-align: center;
    margin-top: 1px;
  }
  .rpe-select {
    width: 100%;
    border: 1px solid var(--mid);
    background: var(--white);
    border-radius: 6px;
    padding: 8px 2px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    color: var(--navy);
    font-family: inherit;
    appearance: none;
    -webkit-appearance: none;
  }
  .check-btn {
    background: var(--light);
    border: 2px solid var(--mid);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--gray);
    transition: all 0.15s;
  }
  .check-btn:active { transform: scale(0.92); }
  .set-row.done .check-btn {
    background: var(--success);
    border-color: var(--success);
    color: var(--white);
  }

  .sets-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--light);
    border-radius: 8px;
    font-size: 12px;
  }
  .sets-meta .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }
  .sets-meta .item label {
    color: var(--gray);
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.4px;
  }
  .sets-meta .item value {
    color: var(--navy);
    font-weight: 700;
    font-size: 14px;
    margin-top: 2px;
  }

  /* ============ CHECKLIST (warm-up / daily) ============ */
  .check-item {
    background: var(--white);
    border-radius: var(--radius);
    margin-bottom: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--mid);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .check-item.done { background: #EEF7F0; border-color: var(--success); }
  .check-item .figure {
    width: 74px; height: 52px; background: var(--white);
    border-radius: 8px; padding: 2px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .check-item .figure img { width: 100%; height: 100%; object-fit: contain; }
  .check-item .figure svg { width: 100%; height: 100%; }
  .check-item .info { flex: 1; min-width: 0; }
  .check-item .info .name { font-weight: 700; font-size: 14px; color: var(--navy); }
  .check-item .info .desc { font-size: 12px; color: var(--gray); margin-top: 2px; line-height: 1.35; }
  .check-item .target {
    flex-shrink: 0;
    color: var(--orange);
    font-weight: 700;
    font-size: 13px;
    text-align: right;
    min-width: 60px;
  }
  .check-item.done .target { color: var(--success); text-decoration: line-through; }
  .check-item .checkmark {
    flex-shrink: 0;
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--mid);
    display: flex; align-items: center; justify-content: center;
    color: transparent;
    font-size: 14px;
    font-weight: 700;
  }
  .check-item.done .checkmark {
    background: var(--success); border-color: var(--success);
    color: var(--white);
  }

  /* ============ COOLDOWN BOX ============ */
  .cooldown-box {
    background: linear-gradient(135deg, #E5F0E8 0%, var(--white) 100%);
    border: 1px solid var(--success);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .cooldown-box .label {
    font-size: 11px;
    color: var(--success);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ============ ACTION BAR ============ */
  .action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1px solid var(--mid);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    z-index: 30;
    box-shadow: 0 -2px 8px rgba(31,42,68,0.04);
  }
  .action-bar-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 13px 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--orange); color: var(--white); }
  .btn-secondary { background: var(--light); color: var(--navy); border: 1px solid var(--mid); }
  .btn-danger { background: #FCE8E2; color: var(--danger); }

  /* ============ TIMER OVERLAY ============ */
  .timer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31,42,68,0.92);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .timer-overlay.show { display: flex; }
  .timer-box {
    background: var(--white);
    border-radius: 16px;
    padding: 32px 24px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .timer-label {
    font-size: 12px;
    color: var(--orange);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .timer-display {
    font-size: 72px;
    font-weight: 700;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 8px;
  }
  .timer-display.warn { color: var(--orange); }
  .timer-display.done { color: var(--success); animation: pulse 0.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .timer-of {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 24px;
  }
  .timer-actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .timer-actions button {
    padding: 12px 8px;
    border: 1px solid var(--mid);
    background: var(--white);
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    color: var(--navy);
    font-family: inherit;
  }
  .timer-actions button.primary { background: var(--orange); color: var(--white); border-color: var(--orange); }

  /* ============ HISTORY MODAL ============ */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31,42,68,0.5);
    z-index: 90;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.show { display: flex; }
  .modal-box {
    background: var(--white);
    border-radius: 16px 16px 0 0;
    padding: 16px;
    width: 100%;
    max-width: 720px;
    max-height: 80vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--mid);
  }
  .modal-header h3 {
    font-size: 17px;
    color: var(--navy);
  }
  .modal-close {
    background: var(--light);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    font-weight: 700;
    color: var(--gray);
  }
  .history-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--mid);
    font-size: 13px;
  }
  .history-item .date { font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .history-item .summary { color: var(--gray); font-size: 12px; }
  .history-item .exercises { margin-top: 6px; font-size: 12px; color: var(--text); }
  .history-empty { padding: 40px 20px; text-align: center; color: var(--gray); font-size: 14px; }

  /* desktop tweaks */
  @media (min-width: 600px) {
    .card-figure { width: 110px; height: 78px; }
    .check-item .figure { width: 92px; height: 64px; }
    .set-row {
      grid-template-columns: 44px 1fr 1fr 70px auto;
      gap: 10px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <div class="title" id="sessionTitle">Sessione A</div>
      <div class="session-date" id="sessionDate"></div>
    </div>
    <div class="session-timer" id="sessionTimer" title="Timer seduta — tap per reset">00:00</div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab" data-key="warmup">Warm-up <span class="count" id="cnt-warmup">0/5</span></button>
    <button class="tab active" data-key="sessionA">Sessione A <span class="count" id="cnt-sessionA">0/6</span></button>
    <button class="tab" data-key="sessionB">Sessione B <span class="count" id="cnt-sessionB">0/6</span></button>
    <button class="tab" data-key="daily">Daily <span class="count" id="cnt-daily">0/7</span></button>
  </div>
</nav>

<main id="main"></main>

<div class="action-bar">
  <div class="action-bar-inner">
    <button class="btn btn-secondary" id="btnHistory">📋 Storico</button>
    <button class="btn btn-secondary" id="btnReset">Reset oggi</button>
    <button class="btn btn-primary" id="btnSave">Salva seduta</button>
  </div>
</div>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="timer-label" id="timerLabel">RECUPERO</div>
    <div class="timer-display" id="timerDisplay">1:30</div>
    <div class="timer-of" id="timerOf"></div>
    <div class="timer-actions">
      <button id="btnTimerPause">Pausa</button>
      <button id="btnTimerSkip">Salta</button>
      <button id="btnTimerAdd" class="primary">+15s</button>
    </div>
  </div>
</div>

<div class="modal" id="historyModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Storico Sedute</h3>
      <button class="modal-close" id="btnHistoryClose">×</button>
    </div>
    <div id="historyContent"></div>
  </div>
</div>

 60}, {"id": "side_plank", "name": "Side Plank", "tag": "6 — CORE ANTI-ROTAZIONE ⭐", "svg": "side_plank", "esecuzione": ["Su un fianco, avambraccio sotto la spalla", "Solleva bacino: caviglia-anca-spalla allineate", "Tenuta isometrica, respira normalmente", "Cambia lato"], "cues": ["NIENTE collasso bacino verso pavimento", "Spinge il fianco verso il soffitto", "Lavora obliquo + quadrato lombi = stabilizza bacino"], "sets": 2, "reps_target": "30-45 sec/lato", "weight_default": 0, "tempo": "tenuta", "rest": 30, "bodyweight": true, "is_time": true}], "cooldown": "Stretch ileopsoas 90/90 1'/lato + Respirazione 4-7-8 × 5 cicli"}, "daily": {"title": "Routine Quotidiana", "subtitle": "5-10 min · ANCHE giorni off · Mattina o pausa pranzo", "type": "checklist", "exercises": [{"id": "chin_tuck_d", "name": "Chin Tuck", "svg": "chin_tuck", "esecuzione": "Riprogramma i flessori profondi del collo. Anti testa avanti.", "target": "× 10"}, {"id": "wall_slide_d", "name": "Wall Slides", "svg": "wall_slide", "esecuzione": "Riattiva il trapezio inferiore e dentato. Apre la postura toracica.", "target": "× 10"}, {"id": "cat_cow_d", "name": "Cat-Cow", "svg": "cat_cow", "esecuzione": "Mobilizza tutta la colonna in flesso-estensione. Anti-rigidità da seduta.", "target": "× 8 lente"}, {"id": "glute_bridge_d", "name": "Glute Bridge", "svg": "glute_bridge", "esecuzione": "Sveglia i glutei dopo ore seduto. Inibisce gli ileopsoas.", "target": "× 15"}, {"id": "hip_flexor_90_d", "name": "Stretch ileopsoas 90/90", "svg": "hip_flexor_90", "esecuzione": "CRUCIALE. Allunga gli ileopsoas accorciati dalle ore in sedia.", "target": "1' / lato"}, {"id": "pec_stretch_d", "name": "Doorway pec stretch", "svg": "pec_stretch", "esecuzione": "Apre il petto, contrasta cifosi e spalle in avanti.", "target": "30\" × 2"}, {"id": "breathing_d", "name": "Respirazione diaframmatica", "svg": "dead_bug", "esecuzione": "Sdraiato supino, una mano sul petto e una sulla pancia. Inspira facendo salire SOLO la mano della pan // ============ STATE ============
const STORAGE_KEY = 'anthony_workout_v1';
const TODAY = new Date().toISOString().slice(0, 10);

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    s.current = s.current || {};
    s.history = s.history || [];
    return s;
  } catch(e) {
    return { current: {}, history: [] };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
// If date changed since last session, clear current
if (state.currentDate !== TODAY) {
  state.current = {};
  state.currentDate = TODAY;
  saveState();
}

let currentTab = 'sessionA';
let sessionStartTs = null;
let sessionTimerInterval = null;
let restTimerInterval = null;
let restRemaining = 0;
let restTotal = 0;
let restPaused = false;
let restExerciseLabel = '';

// ============ RENDER ============
const $main = document.getElementById('main');
const $sessionTitle = document.getElementById('sessionTitle');
const $sessionDate = document.getElementById('sessionDate');

function getExerciseState(exId) {
  if (!state.current[currentTab]) state.current[currentTab] = {};
  if (!state.current[currentTab][exId]) state.current[currentTab][exId] = {};
  return state.current[currentTab][exId];
}

function renderTab(key) {
  currentTab = key;
  const section = PROGRAM[key];
  $sessionTitle.textContent = section.title;
  const opts = { weekday: 'long', day: 'numeric', month: 'short' };
  $sessionDate.textContent = new Date().toLocaleDateString('it-IT', opts) + ' · ' + (section.subtitle || '');

  // Mark active tab
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  $main.innerHTML = '';

  // Session header
  const header = document.createElement('div');
  header.className = 'session-header';
  header.innerHTML = `<h2>${section.title}</h2><div class="sub">${section.subtitle || ''}</div>`;
  $main.appendChild(header);

  // Render exercises
  if (section.type === 'workout') {
    section.exercises.forEach(ex => $main.appendChild(renderWorkoutExercise(ex)));
    if (section.cooldown) {
      const cd = document.createElement('div');
      cd.className = 'cooldown-box';
      cd.innerHTML = `<div class="label">⚡ Cool-down (3 min)</div>${section.cooldown}`;
      $main.appendChild(cd);
    }
  } else {
    section.exercises.forEach(ex => $main.appendChild(renderChecklistItem(ex)));
  }

  updateAllCounts();
}

function renderWorkoutExercise(ex) {
  const st = getExerciseState(ex.id);
  if (!st.sets) {
    st.sets = Array.from({length: ex.sets}, () => ({reps: '', weight: ex.weight_default || '', rpe: '', done: false}));
  }

  const doneCount = st.sets.filter(s => s.done).length;
  const totalSets = ex.sets;

  const card = document.createElement('div');
  card.className = 'card';
  if (st.open) card.classList.add('open');
  if (doneCount === totalSets) card.classList.add('done');

  const progressClass = doneCount === totalSets ? 'done' :
                        doneCount > 0 ? 'partial' : '';

  card.innerHTML = `
    <div class="card-head">
      <div class="card-figure"><img src="${ex.svg}.png" alt="${ex.name}" loading="lazy"></div>
      <div class="card-head-text">
        <div class="card-tag">${ex.tag}</div>
        <div class="card-name">${ex.name}</div>
        <div class="card-summary">${totalSets}×${ex.reps_target} · rec ${ex.rest}"</div>
      </div>
      <div class="card-progress ${progressClass}">${doneCount}/${totalSets}</div>
    </div>
    <div class="card-body"></div>
  `;

  card.querySelector('.card-head').addEventListener('click', () => {
    card.classList.toggle('open');
    st.open = card.classList.contains('open');
    saveState();
  });

  const body = card.querySelector('.card-body');

  // Execution (collapsible)
  const exec = document.createElement('div');
  exec.className = 'exec';
  const cuesHtml = ex.cues && ex.cues.length ? `
    <div class="cues-label">Punti chiave</div>
    <ul>${ex.cues.map(c => `<li>${c}</li>`).join('')}</ul>` : '';
  exec.innerHTML = `
    <details>
      <summary>📖 Come eseguire</summary>
      <ul>${ex.esecuzione.map(e => `<li>${e}</li>`).join('')}</ul>
      ${cuesHtml}
    </details>
  `;
  body.appendChild(exec);

  // Sets
  const setsWrap = document.createElement('div');
  setsWrap.style.marginTop = '14px';

  st.sets.forEach((setData, idx) => {
    const row = document.createElement('div');
    row.className = 'set-row';
    if (idx === st.sets.length - 1) row.classList.add('last');
    if (setData.done) row.classList.add('done');

    const repsLabel = ex.is_time ? 'sec' : (ex.bodyweight ? 'reps' : 'reps');
    const weightLabel = ex.bodyweight ? (ex.elastic ? 'elastico' : '—') : 'kg';

    row.innerHTML = `
      <div class="set-num">${idx + 1}</div>
      <div class="set-field">
        <label>${repsLabel.toUpperCase()}</label>
        <input type="number" inputmode="numeric" class="reps-input"
               placeholder="" value="${setData.reps}">
        <div class="target">${ex.reps_target}</div>
      </div>
      <div class="set-field">
        <label>${weightLabel.toUpperCase()}</label>
        <input type="number" inputmode="decimal" step="0.5" class="weight-input"
               placeholder="" value="${setData.weight}"
               ${ex.bodyweight && !ex.elastic ? 'disabled' : ''}>
        <div class="target">${ex.bodyweight && !ex.elastic ? 'corpo libero' : 'default ' + (ex.weight_default || '-')}</div>
      </div>
      <div class="set-field">
        <label>RPE</label>
        <select class="rpe-select">
          <option value="">-</option>
          ${[6,7,8,9,10].map(n => `<option value="${n}" ${setData.rpe == n ? 'selected' : ''}>${n}</option>`).join('')}
        </select>
        <div class="target">1-10</div>
      </div>
      <button class="check-btn" title="Segna fatta">✓</button>
    `;

    row.querySelector('.reps-input').addEventListener('change', e => {
      setData.reps = e.target.value;
      saveState();
    });
    row.querySelector('.weight-input').addEventListener('change', e => {
      setData.weight = e.target.value;
      saveState();
    });
    row.querySelector('.rpe-select').addEventListener('change', e => {
      setData.rpe = e.target.value;
      saveState();
    });
    row.querySelector('.check-btn').addEventListener('click', () => {
      setData.done = !setData.done;
      saveState();
      // Trigger rest timer when marking done
      if (setData.done && idx < st.sets.length - 1) {
        startRestTimer(ex.rest, ex.name + ' · Serie ' + (idx + 2));
      } else if (setData.done && idx === st.sets.length - 1) {
        // Last set done - small celebration: brief feedback
      }
      renderTab(currentTab);
    });

    setsWrap.appendChild(row);
  });

  body.appendChild(setsWrap);

  // Meta footer with tempo + rest
  const meta = document.createElement('div');
  meta.className = 'sets-meta';
  meta.innerHTML = `
    <div class="item"><label>Tempo</label><value>${ex.tempo || '-'}</value></div>
    <div class="item"><label>Recupero</label><value>${ex.rest}s</value></div>
    <div class="item"><label>Target</label><value>${ex.reps_target}</value></div>
  `;
  body.appendChild(meta);

  return card;
}

function renderChecklistItem(ex) {
  const st = getExerciseState(ex.id);
  const item = document.createElement('div');
  item.className = 'check-item';
  if (st.done) item.classList.add('done');

  item.innerHTML = `
    <div class="figure"><img src="${ex.svg}.png" alt="${ex.name}" loading="lazy"></div>
    <div class="info">
      <div class="name">${ex.name}</div>
      <div class="desc">${ex.esecuzione}</div>
    </div>
    <div class="target">${ex.target}</div>
    <div class="checkmark">✓</div>
  `;

  item.addEventListener('click', () => {
    st.done = !st.done;
    saveState();
    item.classList.toggle('done');
    updateAllCounts();
  });

  return item;
}

function updateAllCounts() {
  Object.keys(PROGRAM).forEach(key => {
    const section = PROGRAM[key];
    const cur = state.current[key] || {};
    let done = 0;
    let total = section.exercises.length;
    if (section.type === 'workout') {
      section.exercises.forEach(ex => {
        const st = cur[ex.id];
        if (st && st.sets && st.sets.every(s => s.done)) done++;
      });
    } else {
      section.exercises.forEach(ex => {
        if (cur[ex.id] && cur[ex.id].done) done++;
      });
    }
    const $c = document.getElementById('cnt-' + key);
    if ($c) {
      $c.textContent = `${done}/${total}`;
      const tab = document.querySelector(`.tab[data-key="${key}"]`);
      if (tab) tab.classList.toggle('completed', done === total);
    }
  });
}

// ============ REST TIMER ============
const $timerOverlay = document.getElementById('timerOverlay');
const $timerDisplay = document.getElementById('timerDisplay');
const $timerLabel = document.getElementById('timerLabel');
const $timerOf = document.getElementById('timerOf');

function formatTimer(s) {
  const m = Math.floor(Math.abs(s) / 60);
  const sec = Math.abs(s) % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start();
    o.stop(ctx.currentTime + 0.4);
    setTimeout(() => {
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.type = 'sine'; o2.frequency.value = 1100;
      g2.gain.setValueAtTime(0.2, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o2.start(); o2.stop(ctx.currentTime + 0.4);
    }, 250);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
}

function startRestTimer(seconds, label) {
  restTotal = seconds;
  restRemaining = seconds;
  restExerciseLabel = label;
  restPaused = false;
  $timerLabel.textContent = 'RECUPERO';
  $timerOf.textContent = label;
  updateRestDisplay();
  $timerOverlay.classList.add('show');
  clearInterval(restTimerInterval);
  restTimerInterval = setInterval(() => {
    if (restPaused) return;
    restRemaining--;
    updateRestDisplay();
    if (restRemaining === 0) {
      beep();
    }
    if (restRemaining <= -10) {
      stopRestTimer();
    }
  }, 1000);
}

function updateRestDisplay() {
  $timerDisplay.textContent = formatTimer(restRemaining);
  $timerDisplay.classList.toggle('warn', restRemaining > 0 && restRemaining <= 10);
  $timerDisplay.classList.toggle('done', restRemaining <= 0);
}

function stopRestTimer() {
  clearInterval(restTimerInterval);
  $timerOverlay.classList.remove('show');
}

document.getElementById('btnTimerSkip').addEventListener('click', stopRestTimer);
document.getElementById('btnTimerPause').addEventListener('click', () => {
  restPaused = !restPaused;
  document.getElementById('btnTimerPause').textContent = restPaused ? 'Riprendi' : 'Pausa';
});
document.getElementById('btnTimerAdd').addEventListener('click', () => {
  restRemaining += 15;
  updateRestDisplay();
});
$timerOverlay.addEventListener('click', (e) => {
  if (e.target === $timerOverlay) stopRestTimer();
});

// ============ SESSION TIMER ============
const $sessionTimer = document.getElementById('sessionTimer');
function updateSessionTimer() {
  if (!sessionStartTs) {
    $sessionTimer.textContent = '00:00';
    return;
  }
  const elapsed = Math.floor((Date.now() - sessionStartTs) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  $sessionTimer.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
$sessionTimer.addEventListener('click', () => {
  if (sessionStartTs) {
    if (confirm('Resettare il timer della seduta?')) {
      sessionStartTs = Date.now();
      updateSessionTimer();
    }
  } else {
    sessionStartTs = Date.now();
    sessionTimerInterval = setInterval(updateSessionTimer, 1000);
    updateSessionTimer();
  }
});

// auto-start when first interaction happens
function ensureSessionTimerStarted() {
  if (!sessionStartTs) {
    sessionStartTs = Date.now();
    sessionTimerInterval = setInterval(updateSessionTimer, 1000);
    updateSessionTimer();
  }
}

// ============ TABS ============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => renderTab(tab.dataset.key));
});

// ============ ACTIONS ============
document.getElementById('btnSave').addEventListener('click', () => {
  const session = {
    date: TODAY,
    timestamp: Date.now(),
    data: JSON.parse(JSON.stringify(state.current))
  };
  // compute summary
  const summary = {};
  Object.keys(PROGRAM).forEach(k => {
    const section = PROGRAM[k];
    const cur = state.current[k] || {};
    if (section.type === 'workout') {
      let done = 0, total = section.exercises.length;
      section.exercises.forEach(ex => {
        const st = cur[ex.id];
        if (st && st.sets && st.sets.every(s => s.done)) done++;
      });
      if (done > 0) summary[k] = `${done}/${total}`;
    } else {
      let done = 0, total = section.exercises.length;
      section.exercises.forEach(ex => { if (cur[ex.id] && cur[ex.id].done) done++; });
      if (done > 0) summary[k] = `${done}/${total}`;
    }
  });
  session.summary = summary;
  if (Object.keys(summary).length === 0) {
    alert('Nessun esercizio segnato come fatto. Spunta almeno una serie prima di salvare.');
    return;
  }
  state.history.unshift(session);
  // keep last 60 sessions
  state.history = state.history.slice(0, 60);
  saveState();
  alert('Seduta salvata! 💪');
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('Cancellare tutti i dati di oggi? (lo storico è preservato)')) return;
  state.current = {};
  sessionStartTs = null;
  if (sessionTimerInterval) clearInterval(sessionTimerInterval);
  updateSessionTimer();
  saveState();
  renderTab(currentTab);
});

// ============ HISTORY ============
const $historyModal = document.getElementById('historyModal');
const $historyContent = document.getElementById('historyContent');
document.getElementById('btnHistory').addEventListener('click', () => {
  renderHistory();
  $historyModal.classList.add('show');
});
document.getElementById('btnHistoryClose').addEventListener('click', () => {
  $historyModal.classList.remove('show');
});
$historyModal.addEventListener('click', e => {
  if (e.target === $historyModal) $historyModal.classList.remove('show');
});

function renderHistory() {
  if (!state.history.length) {
    $historyContent.innerHTML = '<div class="history-empty">Nessuna seduta salvata. Completa la prima!</div>';
    return;
  }
  $historyContent.innerHTML = state.history.map(s => {
    const d = new Date(s.timestamp);
    const dateStr = d.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' });
    const timeStr = d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const summaryLines = Object.entries(s.summary || {}).map(([k, v]) => {
      const t = PROGRAM[k] ? PROGRAM[k].title : k;
      return `<span style="display: inline-block; margin-right: 8px;"><b>${t}</b>: ${v}</span>`;
    }).join('');
    // Detail: list top exercises with reps/weight if workout
    const details = [];
    Object.keys(s.data).forEach(k => {
      if (!PROGRAM[k] || PROGRAM[k].type !== 'workout') return;
      PROGRAM[k].exercises.forEach(ex => {
        const st = s.data[k][ex.id];
        if (st && st.sets) {
          const completed = st.sets.filter(x => x.done);
          if (completed.length === 0) return;
          const tops = completed.map(s2 => `${s2.reps||'-'}r×${s2.weight||'-'}kg`).join(', ');
          details.push(`${ex.name}: ${tops}`);
        }
      });
    });
    return `
      <div class="history-item">
        <div class="date">${dateStr} · ${timeStr}</div>
        <div class="summary">${summaryLines}</div>
        ${details.length ? `<div class="exercises">${details.slice(0,4).join('<br>')}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ============ AUTO-START SESSION TIMER ============
document.addEventListener('click', ensureSessionTimerStarted, { once: true, capture: true });

// ============ INIT ============
renderTab('sessionA');
updateAllCounts();

// Prevent body scroll when timer overlay is open
const observer = new MutationObserver(() => {
  document.body.style.overflow = $timerOverlay.classList.contains('show') ||
                                  $historyModal.classList.contains('show') ? 'hidden' : '';
});
observer.observe($timerOverlay, { attributes: true });
observer.observe($historyModal, { attributes: true });
</script>
